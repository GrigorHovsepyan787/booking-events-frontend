<div class="auth-page">
  <div class="auth-card card fade-in-up">
    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Sign in to manage your bookings</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" class="auth-form">
      
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input 
          id="username" 
          type="text" 
          formControlName="username"
          class="input"
          [class.is-invalid]="form['username'].touched && form['username'].invalid"
          placeholder="Enter your username" />
        @if (form['username'].touched && form['username'].errors?.['required']) {
          <div class="error-message">Username is required.</div>
        }
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input 
          id="password" 
          type="password" 
          formControlName="password"
          class="input"
          [class.is-invalid]="form['password'].touched && form['password'].invalid"
          placeholder="Enter your password" />
        @if (form['password'].touched && form['password'].errors?.['required']) {
          <div class="error-message">Password is required.</div>
        }
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="loginForm.invalid" class="btn btn-primary btn-submit">
          Sign In
        </button>
      </div>

      <div class="auth-footer">
        <span>Don't have an account?</span>
        <a routerLink="/register" class="auth-link">Create one</a>
      </div>
    </form>
  </div>
</div>
