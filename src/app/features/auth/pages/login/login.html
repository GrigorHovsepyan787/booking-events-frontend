<p>login works!</p>
<form (ngSubmit)="login()">

  <div>
    <label>Username</label>
    <input
      type="text"
      [(ngModel)]="username"
      name="username">
  </div>

  <div>
    <label>Password</label>
    <input
      type="password"
      [(ngModel)]="password"
      name="password">
  </div>

  <button type="submit">
    Login
  </button>

</form>
