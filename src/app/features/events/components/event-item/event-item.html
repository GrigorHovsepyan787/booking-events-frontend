<div class="event-item card">
  <div class="event-item__header">
    <div class="event-item__title-row">
      <h3 class="event-item__title">{{ event.title }}</h3>
    </div>
    <span class="event-item__date">
      <span class="date-icon">📅</span>
      {{ event.eventDate | date: 'mediumDate' }}
    </span>
    <button type="button" (click)="onViewDetails()" class="btn btn-primary btn-view">
      View Details →
    </button>
  </div>
</div>
